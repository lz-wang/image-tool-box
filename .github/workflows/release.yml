name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: macos-amd64
            runs_on: macos-15-intel
            goos: darwin
            goarch: amd64
            bins_dir: bins/macos-amd64
            exe_suffix: ""
            archive_ext: tar.gz
            cmake_extra_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - name: macos-arm64
            runs_on: macos-15
            goos: darwin
            goarch: arm64
            bins_dir: bins/macos-arm64
            exe_suffix: ""
            archive_ext: tar.gz
            cmake_extra_args: -DCMAKE_OSX_ARCHITECTURES=arm64
          - name: linux-amd64
            runs_on: ubuntu-24.04
            goos: linux
            goarch: amd64
            bins_dir: bins/linux-amd64
            exe_suffix: ""
            archive_ext: tar.gz
            cmake_extra_args: ""
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            bins_dir: bins/linux-arm64
            exe_suffix: ""
            archive_ext: tar.gz
            cmake_extra_args: ""
          - name: windows-amd64
            runs_on: windows-2025
            goos: windows
            goarch: amd64
            bins_dir: bins/windows-amd64
            exe_suffix: .exe
            archive_ext: zip
            cmake_extra_args: ""
          - name: windows-arm64
            runs_on: windows-11-arm
            goos: windows
            goarch: arm64
            bins_dir: bins/windows-arm64
            exe_suffix: .exe
            archive_ext: zip
            cmake_extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nasm pkg-config

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install nasm

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake nasm

      - name: Build pngquant and oxipng (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ matrix.target.bins_dir }}"

          git clone --depth 1 --branch 3.0.3 --recursive https://github.com/kornelski/pngquant.git /tmp/pngquant
          pngquant_lock_flag=""
          if [[ -f /tmp/pngquant/Cargo.lock ]]; then
            pngquant_lock_flag="--locked"
          fi
          cargo build --manifest-path /tmp/pngquant/Cargo.toml --release ${pngquant_lock_flag}
          install -m 0755 /tmp/pngquant/target/release/pngquant "${{ matrix.target.bins_dir }}/pngquant"

          git clone --depth 1 --branch v10.1.0 https://github.com/oxipng/oxipng.git /tmp/oxipng
          oxipng_lock_flag=""
          if [[ -f /tmp/oxipng/Cargo.lock ]]; then
            oxipng_lock_flag="--locked"
          fi
          cargo build --manifest-path /tmp/oxipng/Cargo.toml --release ${oxipng_lock_flag}
          install -m 0755 /tmp/oxipng/target/release/oxipng "${{ matrix.target.bins_dir }}/oxipng"

      - name: Build pngquant and oxipng (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binsDir = "${{ matrix.target.bins_dir }}"
          New-Item -ItemType Directory -Force -Path $binsDir | Out-Null

          $pngquantDir = Join-Path $env:RUNNER_TEMP "pngquant"
          if (Test-Path $pngquantDir) { Remove-Item -Recurse -Force $pngquantDir }
          git clone --depth 1 --branch 3.0.3 --recursive https://github.com/kornelski/pngquant.git $pngquantDir
          $pngquantArgs = @("build", "--manifest-path", (Join-Path $pngquantDir "Cargo.toml"), "--release")
          if (Test-Path (Join-Path $pngquantDir "Cargo.lock")) { $pngquantArgs += "--locked" }
          cargo @pngquantArgs
          Copy-Item (Join-Path $pngquantDir "target\release\pngquant.exe") (Join-Path $binsDir "pngquant.exe")

          $oxipngDir = Join-Path $env:RUNNER_TEMP "oxipng"
          if (Test-Path $oxipngDir) { Remove-Item -Recurse -Force $oxipngDir }
          git clone --depth 1 --branch v10.1.0 https://github.com/oxipng/oxipng.git $oxipngDir
          $oxipngArgs = @("build", "--manifest-path", (Join-Path $oxipngDir "Cargo.toml"), "--release")
          if (Test-Path (Join-Path $oxipngDir "Cargo.lock")) { $oxipngArgs += "--locked" }
          cargo @oxipngArgs
          Copy-Item (Join-Path $oxipngDir "target\release\oxipng.exe") (Join-Path $binsDir "oxipng.exe")

      - name: Build libjpeg-turbo static tools (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 --branch 3.1.3 https://github.com/libjpeg-turbo/libjpeg-turbo.git /tmp/libjpeg-turbo
          cmake -S /tmp/libjpeg-turbo -B /tmp/libjpeg-turbo/build \
            -DENABLE_SHARED=FALSE \
            -DENABLE_STATIC=TRUE \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.target.cmake_extra_args }}
          cmake --build /tmp/libjpeg-turbo/build --parallel
          install -m 0755 /tmp/libjpeg-turbo/build/cjpeg-static "${{ matrix.target.bins_dir }}/cjpeg-static"
          install -m 0755 /tmp/libjpeg-turbo/build/djpeg-static "${{ matrix.target.bins_dir }}/djpeg-static"
          if [[ -f /tmp/libjpeg-turbo/build/jpegtran-static ]]; then
            install -m 0755 /tmp/libjpeg-turbo/build/jpegtran-static "${{ matrix.target.bins_dir }}/jpegtran-static"
          fi

      - name: Build libjpeg-turbo static tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binsDir = "${{ matrix.target.bins_dir }}"
          $libjpegDir = Join-Path $env:RUNNER_TEMP "libjpeg-turbo"
          $buildDir = Join-Path $libjpegDir "build"
          $cmakeArch = if ("${{ matrix.target.goarch }}" -eq "arm64") { "ARM64" } else { "x64" }

          if (Test-Path $libjpegDir) { Remove-Item -Recurse -Force $libjpegDir }
          git clone --depth 1 --branch 3.1.3 https://github.com/libjpeg-turbo/libjpeg-turbo.git $libjpegDir

          cmake -S $libjpegDir -B $buildDir -A $cmakeArch -DENABLE_SHARED=FALSE -DENABLE_STATIC=TRUE -DCMAKE_BUILD_TYPE=Release
          cmake --build $buildDir --config Release --parallel

          $candidates = @{
            "cjpeg-static.exe" = @(
              (Join-Path $buildDir "Release\cjpeg-static.exe"),
              (Join-Path $buildDir "cjpeg-static.exe")
            )
            "djpeg-static.exe" = @(
              (Join-Path $buildDir "Release\djpeg-static.exe"),
              (Join-Path $buildDir "djpeg-static.exe")
            )
          }

          foreach ($fileName in $candidates.Keys) {
            $source = $null
            foreach ($candidate in $candidates[$fileName]) {
              if (Test-Path $candidate) {
                $source = $candidate
                break
              }
            }

            if (-not $source) {
              throw "Expected libjpeg-turbo artifact not found: $fileName"
            }

            Copy-Item $source (Join-Path $binsDir $fileName)
          }

      - name: Verify required bundled binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          test -x "${{ matrix.target.bins_dir }}/pngquant"
          test -x "${{ matrix.target.bins_dir }}/oxipng"
          test -x "${{ matrix.target.bins_dir }}/cjpeg-static"
          test -x "${{ matrix.target.bins_dir }}/djpeg-static"

      - name: Verify required bundled binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binsDir = "${{ matrix.target.bins_dir }}"
          $required = @(
            "pngquant.exe",
            "oxipng.exe",
            "cjpeg-static.exe",
            "djpeg-static.exe"
          )

          foreach ($fileName in $required) {
            $path = Join-Path $binsDir $fileName
            if (-not (Test-Path $path)) {
              throw "Missing bundled binary: $path"
            }
          }

      - name: Build itb (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/itb-${{ matrix.target.name }}
          go build -trimpath -ldflags "-s -w -X main.version=${{ env.RELEASE_TAG }}" -o dist/itb-${{ matrix.target.name }}/itb .

      - name: Build itb (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          $distDir = Join-Path "dist" "itb-${{ matrix.target.name }}"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          go build -trimpath -ldflags "-s -w -X main.version=${{ env.RELEASE_TAG }}" -o (Join-Path $distDir "itb.exe") .

      - name: Package platform binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/itb-${{ matrix.target.name }}/bins
          cp -R "${{ matrix.target.bins_dir }}" "dist/itb-${{ matrix.target.name }}/bins/"

      - name: Package platform binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $distDir = Join-Path "dist" "itb-${{ matrix.target.name }}"
          $distBinsDir = Join-Path $distDir "bins"
          New-Item -ItemType Directory -Force -Path $distBinsDir | Out-Null
          Copy-Item "${{ matrix.target.bins_dir }}" $distBinsDir -Recurse

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          tar -C dist -czf "release-assets/itb-${{ env.RELEASE_TAG }}-${{ matrix.target.name }}.tar.gz" "itb-${{ matrix.target.name }}"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Compress-Archive -Path "dist/itb-${{ matrix.target.name }}/*" -DestinationPath "release-assets/itb-${{ env.RELEASE_TAG }}-${{ matrix.target.name }}.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*

  notify:
    name: Notify Release Result
    runs-on: ubuntu-24.04
    needs: [build, publish]
    if: always()

    steps:
      - name: Notify via Pushover
        if: ${{ secrets.PUSHOVER_TOKEN != '' && secrets.PUSHOVER_USER != '' }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          MESSAGE=$(cat <<'EOF'
          <b>ImageToolBox Release 通知</b>
          <u>工作流</u>: <i>${{ github.workflow }}</i>
          <u>构建结果</u>: ${{ needs.build.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#cc0000"><b>{0}</b></font>', needs.build.result) }}
          <u>发布结果</u>: ${{ needs.publish.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#cc0000"><b>{0}</b></font>', needs.publish.result) }}
          <u>版本</u>: <font color="#0000ff">${{ env.RELEASE_TAG }}</font>
          <u>分支/标签</u>: <i>${{ github.ref_name }}</i>
          <u>触发人</u>: <i>${{ github.actor }}</i>
          <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看运行详情</a>
          <u>提交内容</u>:
          ${{ github.event.head_commit.message || github.event.pull_request.title || inputs.tag || 'workflow_dispatch' }}
          EOF
          )
          curl -fsS https://api.pushover.net/1/messages.json \
            --data-urlencode "token=${PUSHOVER_TOKEN}" \
            --data-urlencode "user=${PUSHOVER_USER}" \
            --data-urlencode "title=ImageToolBox Release 通知" \
            --data-urlencode "html=1" \
            --data-urlencode "message=${MESSAGE}"
